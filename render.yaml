services:
  # Backend: Docker Web Service
  - type: web
    name: backend
    runtime: docker
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/hello

  # Frontend: Static Site
  - type: web
    name: frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://replace-this-after-backend-deploy.onrender.com
